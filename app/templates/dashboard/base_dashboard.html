{% extends "base.html" %}
{% block content %}
<div class="flex min-h-[calc(100vh-140px)]">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-950 border-r border-slate-800 shrink-0">
    <div class="p-6 border-b border-slate-800">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-slate-800 border border-slate-700 flex items-center justify-center">
          <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </div>
        <div>
          <p class="font-tech text-sm font-bold text-white">{{ user.username | upper }}</p>
          <p class="text-xs text-slate-500">{{ user.email }}</p>
        </div>
      </div>
    </div>
    <nav class="py-4">
      <a href="/dashboard/favorites" class="sidebar-nav-item {% if active_dash == 'favorites' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        FAVORITES
      </a>
      <a href="/dashboard/history" class="sidebar-nav-item {% if active_dash == 'history' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        BROWSING HISTORY
      </a>
      <a href="/dashboard/orders" class="sidebar-nav-item {% if active_dash == 'orders' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        ORDER HISTORY
      </a>
      <a href="/dashboard/payments" class="sidebar-nav-item {% if active_dash == 'payments' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
        PAYMENT METHODS
      </a>
      <a href="/dashboard/shipping" class="sidebar-nav-item {% if active_dash == 'shipping' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
        SHIPPING
      </a>
      <a href="/dashboard/settings" class="sidebar-nav-item {% if active_dash == 'settings' %}active{% endif %}">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        ACCOUNT SETTINGS
      </a>
      <div class="border-t border-slate-800 mt-4 pt-4">
        <a href="/auth/logout" class="sidebar-nav-item text-red-400 hover:text-red-300">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          SIGN OUT
        </a>
      </div>
    </nav>
  </aside>
  <!-- Main content -->
  <main class="flex-1 bg-slate-950/50 p-8 overflow-auto">
    {% block dash_content %}{% endblock %}
  </main>
</div>
{% endblock %}
