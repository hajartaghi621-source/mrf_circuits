{% extends "dashboard/base_dashboard.html" %}
{% block title %}Account Settings{% endblock %}
{% block dash_content %}
<div class="mb-8">
  <p class="text-cyan-400 font-mono text-xs tracking-widest uppercase mb-2">// Dashboard</p>
  <h2 class="font-tech text-2xl font-bold text-white">ACCOUNT SETTINGS</h2>
</div>
<div class="max-w-xl">
  <form method="POST" action="/dashboard/settings" class="bg-slate-900/60 border border-slate-800 p-8 space-y-5">
    <div>
      <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Username</label>
      <input type="text" value="{{ db_user.username if db_user else '' }}" disabled class="form-input-dark opacity-50 cursor-not-allowed"/>
    </div>
    <div>
      <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Email</label>
      <input type="email" value="{{ db_user.email if db_user else '' }}" disabled class="form-input-dark opacity-50 cursor-not-allowed"/>
    </div>
    <div>
      <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Full Name</label>
      <input name="full_name" type="text" value="{{ db_user.full_name if db_user else '' }}" placeholder="Your full name" class="form-input-dark"/>
    </div>
    <div>
      <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Company</label>
      <input name="company" type="text" value="{{ db_user.company if db_user else '' }}" placeholder="Your company" class="form-input-dark"/>
    </div>
    <div>
      <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Phone</label>
      <input name="phone" type="tel" value="{{ db_user.phone if db_user else '' }}" placeholder="+212 6XX XXX XXX" class="form-input-dark"/>
    </div>
    <button type="submit" class="btn-primary w-full">SAVE CHANGES</button>
  </form>
</div>
{% endblock %}
