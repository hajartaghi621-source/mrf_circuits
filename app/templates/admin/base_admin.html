<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>{% block title %}Admin{% endblock %} — MRF Admin Panel</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="/static/css/styles.css?v=2" rel="stylesheet"/>
  {% block head_extra %}{% endblock %}
</head>
<body class="bg-slate-950 text-slate-100 flex min-h-screen" style="font-family:'Inter',sans-serif">
<!-- Admin Sidebar -->
<aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 fixed h-full z-40">
  <div class="p-6 border-b border-slate-800">
    <a href="/admin" class="flex items-center space-x-3">
      <div class="w-8 h-8 flex items-center justify-center">
        <img src="/static/pic/logo.png" alt="MRF Circuits Logo" class="w-full h-full object-contain" />
      </div>
      <div>
        <p class="font-tech text-sm font-bold text-white">ADMIN PANEL</p>
        <p class="text-xs text-slate-500">MRF Circuits</p>
      </div>
    </a>
  </div>
  <nav class="flex-1 py-4 overflow-y-auto">
    <a href="/admin" class="sidebar-nav-item {% if active_admin == 'dashboard' %}active{% endif %}">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      DASHBOARD
    </a>
    <a href="/admin/products" class="sidebar-nav-item {% if active_admin == 'products' %}active{% endif %}">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      PRODUCTS
    </a>
    <a href="/admin/categories" class="sidebar-nav-item {% if active_admin == 'categories' %}active{% endif %}">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a2 2 0 012-2z"/></svg>
      CATEGORIES
    </a>
    <a href="/admin/orders" class="sidebar-nav-item {% if active_admin == 'orders' %}active{% endif %}">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      ORDERS
    </a>
    <a href="/admin/users" class="sidebar-nav-item {% if active_admin == 'users' %}active{% endif %}">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      USERS
    </a>
    <a href="/admin/quotes" class="sidebar-nav-item {% if active_admin == 'quotes' %}active{% endif %}">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      QUOTES
    </a>
    <div class="border-t border-slate-800 mt-4 pt-4">
      <a href="/" class="sidebar-nav-item">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        VIEW SITE
      </a>
      <a href="/auth/logout" class="sidebar-nav-item text-red-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        SIGN OUT
      </a>
    </div>
  </nav>
</aside>
<!-- Main -->
<div class="ml-64 flex-1 flex flex-col min-h-screen">
  <!-- Top bar -->
  <header class="bg-slate-900 border-b border-slate-800 px-8 py-4 flex items-center justify-between sticky top-0 z-30">
    <h1 class="font-tech text-lg font-bold text-white">{% block page_title %}Admin{% endblock %}</h1>
    <div class="flex items-center space-x-4">
      <span class="text-xs font-mono text-slate-500">{{ admin.username | upper }}</span>
      <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
    </div>
  </header>
  <main class="flex-1 p-8 overflow-auto">
    {% block admin_content %}{% endblock %}
  </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
