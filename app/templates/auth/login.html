{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-16">
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 border border-cyan-800 mb-6">
        <svg class="w-8 h-8 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </div>
      <h2 class="font-tech text-3xl font-bold text-white mb-2">SIGN IN</h2>
      <p class="text-slate-400 text-sm">Access your MRF Circuits account</p>
    </div>
    <!-- Flash messages -->
    {% if messages %}
    {% for msg in messages %}
    <div class="mb-4 p-4 border {% if msg.type == 'error' %}bg-red-900/30 border-red-800 text-red-300{% else %}bg-green-900/30 border-green-800 text-green-300{% endif %} text-sm">
      {{ msg.text }}
    </div>
    {% endfor %}
    {% endif %}
    <!-- Form -->
    <form method="POST" action="/auth/login" class="bg-slate-900/60 border border-slate-800 p-8 space-y-5">
      <div>
        <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Email</label>
        <input id="login-email" name="email" type="email" required placeholder="engineer@company.com" class="form-input-dark"/>
      </div>
      <div>
        <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Password</label>
        <input id="login-password" name="password" type="password" required placeholder="••••••••" class="form-input-dark"/>
      </div>
      <button id="login-submit" type="submit" class="btn-primary w-full">ACCESS ACCOUNT</button>
    </form>
    <!-- OAuth -->
    <div class="mt-6 space-y-3">
      <div class="relative">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
        <div class="relative flex justify-center"><span class="px-4 bg-slate-950 text-xs text-slate-500">OR CONTINUE WITH</span></div>
      </div>
      <a href="/auth/google" id="google-oauth-btn" class="flex items-center justify-center space-x-3 border border-slate-700 hover:border-slate-500 p-3 transition-colors">
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span class="text-sm font-semibold text-white">Continue with Google</span>
      </a>
    </div>
    <p class="mt-6 text-center text-sm text-slate-500">
      No account? <a href="/auth/register" class="text-cyan-400 hover:text-white transition-colors font-semibold">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
