{% extends "base.html" %}
{% block title %}Create Account{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-16">
  <div class="w-full max-w-lg">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 border border-cyan-800 mb-6">
        <svg class="w-8 h-8 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
      </div>
      <h2 class="font-tech text-3xl font-bold text-white mb-2">CREATE ACCOUNT</h2>
      <p class="text-slate-400 text-sm">Join the MRF Circuits engineering network</p>
    </div>
    {% if messages %}
    {% for msg in messages %}
    <div class="mb-4 p-4 border {% if msg.type == 'error' %}bg-red-900/30 border-red-800 text-red-300{% else %}bg-green-900/30 border-green-800 text-green-300{% endif %} text-sm">{{ msg.text }}</div>
    {% endfor %}
    {% endif %}
    <form method="POST" action="/auth/register" class="bg-slate-900/60 border border-slate-800 p-8 space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Full Name</label>
          <input id="reg-fullname" name="full_name" type="text" placeholder="Dr. Ahmed Benali" class="form-input-dark"/>
        </div>
        <div>
          <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Username *</label>
          <input id="reg-username" name="username" type="text" required placeholder="engineer_42" class="form-input-dark"/>
        </div>
      </div>
      <div>
        <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Company / Institution</label>
        <input id="reg-company" name="company" type="text" placeholder="Thales, Airbus, ENSA..." class="form-input-dark"/>
      </div>
      <div>
        <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Email *</label>
        <input id="reg-email" name="email" type="email" required placeholder="engineer@company.com" class="form-input-dark"/>
      </div>
      <div>
        <label class="block text-xs font-bold tracking-widest text-slate-400 uppercase mb-2">Password *</label>
        <input id="reg-password" name="password" type="password" required placeholder="Min. 8 characters" class="form-input-dark"/>
      </div>
      <button id="register-submit" type="submit" class="btn-primary w-full">CREATE ACCOUNT</button>
    </form>
    <p class="mt-6 text-center text-sm text-slate-500">
      Already have an account? <a href="/auth/login" class="text-cyan-400 hover:text-white transition-colors font-semibold">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
